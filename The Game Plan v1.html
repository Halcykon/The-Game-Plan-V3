<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Game Plan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a1a;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  .phone-shell {
    width: 393px;
    height: 852px;
    background: oklch(97% 0.012 75);
    border-radius: 54px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 12px #444, 0 40px 80px rgba(0,0,0,0.7);
    display: flex; flex-direction: column;
  }
  .status-bar {
    height: 54px;
    padding: 16px 28px 0;
    display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  .status-time { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; color: #1c2b1e; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .dynamic-island {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 34px; background: #000;
    border-radius: 20px;
  }
  .screen-area {
    flex: 1;
    overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
  }
  .home-indicator {
    height: 34px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .home-bar {
    width: 130px; height: 5px;
    background: rgba(28,43,30,0.25);
    border-radius: 3px;
  }

  /* App colors */
  :root {
    --cream: oklch(97% 0.012 75);
    --cream-dark: oklch(93% 0.018 75);
    --sage: oklch(52% 0.09 155);
    --sage-light: oklch(88% 0.06 155);
    --sage-bg: oklch(94% 0.04 155);
    --terra: oklch(58% 0.11 50);
    --terra-light: oklch(90% 0.05 50);
    --navy: #1c2b1e;
    --mid: #4a5c4d;
    --soft: #8a9e8d;
  }

  @keyframes slideInRight {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes slideInLeft {
    from { transform: translateX(-100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes fadeUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes cardIn {
    from { transform: translateX(60px) scale(0.97); opacity: 0; }
    to { transform: translateX(0) scale(1); opacity: 1; }
  }
  @keyframes cardOut {
    from { transform: translateX(0) scale(1); opacity: 1; }
    to { transform: translateX(-60px) scale(0.97); opacity: 0; }
  }

  .screen { width: 100%; height: 100%; display: flex; flex-direction: column; }

  /* Scrollable content */
  .scroll-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .scroll-content::-webkit-scrollbar { display: none; }

  /* Home screen */
  .home-hero {
    padding: 24px 28px 20px;
    background: linear-gradient(160deg, oklch(94% 0.05 155) 0%, oklch(97% 0.012 75) 60%);
  }
  .greeting-eyebrow {
    font-size: 12px; font-weight: 500; letter-spacing: 0.08em;
    color: var(--sage); text-transform: uppercase; margin-bottom: 6px;
  }
  .greeting-title {
    font-family: 'Lora', serif; font-size: 28px; font-weight: 600;
    color: var(--navy); line-height: 1.25; margin-bottom: 8px;
  }
  .greeting-sub {
    font-size: 14px; color: var(--mid); line-height: 1.5;
  }
  .progress-row {
    display: flex; gap: 12px; padding: 16px 28px;
  }
  .progress-pill {
    flex: 1; background: white; border-radius: 16px;
    padding: 14px 16px;
    box-shadow: 0 1px 8px rgba(28,43,30,0.08);
    display: flex; align-items: center; gap: 10px;
  }
  .progress-ring { position: relative; width: 36px; height: 36px; flex-shrink: 0; }
  .progress-ring svg { transform: rotate(-90deg); }
  .progress-ring-label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; color: var(--navy);
  }
  .progress-pill-info { flex: 1; min-width: 0; }
  .progress-pill-name { font-size: 11px; font-weight: 500; color: var(--soft); }
  .progress-pill-val { font-size: 14px; font-weight: 600; color: var(--navy); }

  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--soft);
    padding: 0 28px; margin-bottom: 12px;
  }
  .card-list { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

  .interview-card {
    background: white; border-radius: 24px;
    padding: 22px 22px 20px;
    box-shadow: 0 2px 16px rgba(28,43,30,0.08);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative; overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  .interview-card:active { transform: scale(0.98); }
  .interview-card-accent {
    position: absolute; top: 0; right: 0;
    width: 80px; height: 80px; border-radius: 0 24px 0 80px;
    opacity: 0.12;
  }
  .interview-card-icon {
    width: 44px; height: 44px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; margin-bottom: 14px;
  }
  .interview-card-title {
    font-family: 'Lora', serif; font-size: 19px; font-weight: 600;
    color: var(--navy); margin-bottom: 6px;
  }
  .interview-card-desc { font-size: 13px; color: var(--mid); line-height: 1.5; margin-bottom: 16px; }
  .interview-card-footer {
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-meta { font-size: 12px; color: var(--soft); font-weight: 500; }
  .card-cta {
    display: flex; align-items: center; gap: 4px;
    font-size: 13px; font-weight: 600; color: var(--sage);
  }

  /* Interview screen */
  .interview-header {
    padding: 16px 24px 12px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(28,43,30,0.07);
    background: oklch(97% 0.012 75);
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 12px;
    background: white; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 6px rgba(28,43,30,0.1);
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .interview-header-info { flex: 1; }
  .interview-header-title { font-family: 'Lora', serif; font-size: 17px; font-weight: 600; color: var(--navy); }
  .interview-progress-bar {
    height: 4px; background: oklch(88% 0.05 155);
    border-radius: 2px; margin-top: 6px;
    overflow: hidden;
  }
  .interview-progress-fill {
    height: 100%; background: var(--sage); border-radius: 2px;
    transition: width 0.4s ease;
  }

  .question-area {
    flex: 1;
    padding: 24px 20px 16px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .question-counter {
    font-size: 12px; font-weight: 500; color: var(--soft);
    margin-bottom: 8px; letter-spacing: 0.04em;
  }
  .question-card {
    background: white; border-radius: 24px;
    padding: 24px 22px 20px;
    box-shadow: 0 4px 24px rgba(28,43,30,0.1);
    margin-bottom: 16px;
    animation: cardIn 0.35s ease forwards;
  }
  .question-topic-tag {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--sage-bg); color: var(--sage);
    font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; border-radius: 8px; padding: 4px 10px;
    margin-bottom: 14px;
  }
  .question-text {
    font-family: 'Lora', serif; font-size: 20px; font-weight: 600;
    color: var(--navy); line-height: 1.35; margin-bottom: 8px;
  }
  .question-context {
    font-size: 13px; color: var(--mid); line-height: 1.55;
  }

  .options-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex: 1; }
  .option-btn {
    background: white; border: 2px solid oklch(90% 0.02 75);
    border-radius: 16px; padding: 14px 18px;
    text-align: left; cursor: pointer;
    display: flex; align-items: center; gap: 12px;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .option-btn:active { transform: scale(0.98); }
  .option-btn.selected {
    border-color: var(--sage);
    background: var(--sage-bg);
  }
  .option-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid oklch(80% 0.04 75);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
  }
  .option-btn.selected .option-check {
    background: var(--sage); border-color: var(--sage);
  }
  .option-label { font-size: 14px; font-weight: 500; color: var(--navy); line-height: 1.3; flex: 1; }
  .option-sub { font-size: 12px; color: var(--soft); margin-top: 2px; }

  .multi-hint { font-size: 11px; color: var(--soft); text-align: center; margin-top: 4px; font-style: italic; }

  .nav-row {
    padding: 12px 20px 8px;
    display: flex; gap: 10px;
    flex-shrink: 0;
  }
  .nav-btn-skip {
    flex: 0 0 auto; padding: 0 20px; height: 52px;
    border: none; background: oklch(93% 0.018 75); border-radius: 16px;
    font-size: 14px; font-weight: 500; color: var(--mid);
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .nav-btn-next {
    flex: 1; height: 52px;
    border: none; background: var(--sage); border-radius: 16px;
    font-size: 15px; font-weight: 600; color: white;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }
  .nav-btn-next:disabled { opacity: 0.4; }
  .nav-btn-next.finish { background: var(--terra); }

  /* Notes input */
  .notes-input {
    width: 100%; border: 2px solid oklch(90% 0.02 75);
    border-radius: 16px; padding: 14px 16px;
    font-family: 'Inter', sans-serif; font-size: 14px; color: var(--navy);
    background: white; resize: none; outline: none;
    transition: border-color 0.15s;
  }
  .notes-input:focus { border-color: var(--sage); }
  .notes-label { font-size: 12px; font-weight: 500; color: var(--soft); margin-bottom: 6px; }

  /* Bag interview - item check style */
  .bag-category-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .bag-category-icon {
    width: 36px; height: 36px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .bag-category-name {
    font-family: 'Lora', serif; font-size: 18px; font-weight: 600; color: var(--navy);
  }
  .bag-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid oklch(93% 0.015 75);
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .bag-item:last-child { border-bottom: none; }
  .bag-check {
    width: 24px; height: 24px; border-radius: 8px;
    border: 2px solid oklch(80% 0.04 75);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
  }
  .bag-check.checked { background: var(--sage); border-color: var(--sage); }
  .bag-item-text { flex: 1; }
  .bag-item-name { font-size: 14px; font-weight: 500; color: var(--navy); }
  .bag-item-note { font-size: 12px; color: var(--soft); margin-top: 2px; }

  /* Summary screen */
  .summary-header {
    background: linear-gradient(160deg, oklch(88% 0.07 155), oklch(93% 0.04 155));
    padding: 24px 24px 28px;
    text-align: center;
  }
  .summary-check-circle {
    width: 64px; height: 64px; background: var(--sage);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px; font-size: 28px;
    box-shadow: 0 8px 24px rgba(82,148,95,0.35);
  }
  .summary-title { font-family: 'Lora', serif; font-size: 24px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  .summary-sub { font-size: 14px; color: var(--mid); }

  .summary-section { padding: 20px 20px 0; }
  .summary-section-title {
    font-size: 12px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--soft); margin-bottom: 12px;
  }
  .summary-card {
    background: white; border-radius: 20px; padding: 18px 20px;
    box-shadow: 0 2px 12px rgba(28,43,30,0.07); margin-bottom: 12px;
  }
  .summary-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid oklch(93% 0.015 75);
  }
  .summary-row:last-child { border-bottom: none; padding-bottom: 0; }
  .summary-row-topic { font-size: 12px; color: var(--soft); min-width: 90px; flex-shrink: 0; padding-top: 1px; }
  .summary-row-answer { font-size: 14px; font-weight: 500; color: var(--navy); flex: 1; line-height: 1.4; }

  .action-btns { display: flex; gap: 10px; padding: 16px 20px; }
  .action-btn {
    flex: 1; height: 50px; border-radius: 16px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s ease;
  }
  .action-btn:active { transform: scale(0.97); }
  .action-btn-primary { background: var(--sage); color: white; }
  .action-btn-secondary { background: oklch(93% 0.018 75); color: var(--navy); }

  /* Bag summary checklist */
  .bag-summary-cat { margin-bottom: 16px; }
  .bag-summary-cat-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
  }
  .bag-summary-cat-name {
    font-size: 13px; font-weight: 600; color: var(--navy); display: flex; align-items: center; gap: 6px;
  }
  .bag-summary-cat-count { font-size: 12px; color: var(--soft); }
  .bag-summary-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 10px;
    font-size: 13px; color: var(--navy);
    transition: background 0.15s;
  }
  .bag-summary-item.packed { color: var(--soft); }
  .bag-summary-item.packed span { text-decoration: line-through; }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot.packed { background: var(--sage); }
  .dot.unpacked { background: oklch(80% 0.04 75); }

  /* Toast */
  .toast {
    position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--navy); color: white; border-radius: 14px;
    padding: 12px 20px; font-size: 13px; font-weight: 500;
    white-space: nowrap; pointer-events: none;
    animation: fadeUp 0.3s ease forwards;
    z-index: 100;
  }
</style>
</head>
<body>
<div class="phone-shell">
  <div id="root" style="display:flex;flex-direction:column;height:100%;"></div>
</div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── DATA ───────────────────────────────────────────────────────────────────

const BIRTH_PLAN_QUESTIONS = [
  {
    id: "pain",
    topic: "Pain Management",
    question: "How does she want to handle pain during labor?",
    context: "Discuss and agree together — there's no wrong answer. Preferences can change once labor starts.",
    type: "single",
    options: [
      { label: "Unmedicated / natural birth", sub: "Breathing, movement, water therapy" },
      { label: "Open to epidural if needed", sub: "Start natural, decide in the moment" },
      { label: "Epidural as soon as possible", sub: "Plan to request early in labor" },
      { label: "Nitrous oxide (gas & air)", sub: "Mild, takes the edge off" },
      { label: "IV pain medication", sub: "Opioid options like fentanyl" },
    ]
  },
  {
    id: "interventions",
    topic: "Medical Interventions",
    question: "How do you both feel about medical interventions?",
    context: "Talk through your comfort levels. Knowing this helps you advocate together if a situation arises.",
    type: "multi",
    options: [
      { label: "Open to induction if medically needed", sub: "Pitocin or membrane sweeping" },
      { label: "Want to avoid induction if possible", sub: "Prefer to let labor start naturally" },
      { label: "C-section only if emergency", sub: "Prefer vaginal birth strongly" },
      { label: "Comfortable with C-section if recommended", sub: "Trust the care team's judgment" },
      { label: "Want to discuss all options before consenting", sub: "No surprise procedures" },
      { label: "Vacuum or forceps as last resort only", sub: "Only if truly necessary" },
    ]
  },
  {
    id: "room",
    topic: "Who's in the Room",
    question: "Who should be present during delivery?",
    context: "Some moments are best kept intimate. Agree on this in advance to avoid awkward conversations later.",
    type: "multi",
    options: [
      { label: "Just the two of us", sub: "Plus medical staff" },
      { label: "Her mother", sub: "" },
      { label: "Your mother", sub: "" },
      { label: "A doula", sub: "Trained birth support professional" },
      { label: "A close friend or sibling", sub: "" },
      { label: "Others enter after baby arrives", sub: "Private birth, open room after" },
    ]
  },
  {
    id: "cord",
    topic: "Cord Cutting",
    question: "What are the cord cutting preferences?",
    context: "Delayed cord clamping can have benefits. And dad cutting the cord is a powerful moment if you want it.",
    type: "single",
    options: [
      { label: "Delayed cord clamping + dad cuts", sub: "Wait 1–3 min, then you cut" },
      { label: "Delayed cord clamping only", sub: "Medical team cuts when ready" },
      { label: "Dad cuts immediately", sub: "Right after birth" },
      { label: "No preference", sub: "Whatever the team recommends" },
    ]
  },
  {
    id: "skin",
    topic: "Skin-to-Skin",
    question: "What are your skin-to-skin preferences right after birth?",
    context: "Skin-to-skin helps regulate baby's temperature and supports bonding. Dad can do it too if mom needs recovery.",
    type: "multi",
    options: [
      { label: "Mom gets skin-to-skin immediately", sub: "Unless medically prevented" },
      { label: "Dad gets skin-to-skin if mom can't", sub: "Keep baby close to a parent" },
      { label: "Delay newborn procedures (weighing, etc.)", sub: "Do them after bonding time" },
      { label: "Allow immediate breastfeeding attempt", sub: "First latch within the hour" },
      { label: "No rush — everyone recovers first", sub: "Let the team assess baby" },
    ]
  },
  {
    id: "photo",
    topic: "Photography",
    question: "What are the photography and filming rules?",
    context: "Set expectations now so you're not making decisions mid-contraction.",
    type: "multi",
    options: [
      { label: "Dad takes photos/video freely", sub: "Document the whole experience" },
      { label: "Photos of baby only after birth", sub: "No labor/delivery shots" },
      { label: "No photos until mom gives the OK", sub: "She decides in the moment" },
      { label: "Hire a birth photographer", sub: "Professional present in the room" },
      { label: "Video the birth (with consent)", sub: "Full delivery on film" },
      { label: "No photos or video at all", sub: "Private and present only" },
    ]
  },
  {
    id: "placenta",
    topic: "Placenta",
    question: "What do you want to do with the placenta?",
    context: "Hospitals dispose of it by default. Let them know if you have other plans.",
    type: "single",
    options: [
      { label: "Hospital disposes of it", sub: "Standard, nothing to arrange" },
      { label: "Encapsulation (placenta pills)", sub: "Some mothers report benefits" },
      { label: "Cord blood banking", sub: "Store stem cells for future use" },
      { label: "Donate to medical research", sub: "Ask your provider how to arrange" },
      { label: "Bury it / plant a tree", sub: "Symbolic or cultural practice" },
    ]
  },
  {
    id: "nicu",
    topic: "NICU Scenarios",
    question: "Have you discussed what happens if baby needs the NICU?",
    context: "It's rare, but knowing your preferences removes panic from an already stressful situation.",
    type: "multi",
    options: [
      { label: "Dad stays with baby in NICU", sub: "Mom recovers, dad accompanies baby" },
      { label: "Mom prioritized if she can move", sub: "She joins baby as soon as possible" },
      { label: "We've toured the NICU already", sub: "Know what to expect" },
      { label: "Want full updates from staff at all times", sub: "No waiting — inform us constantly" },
      { label: "We've discussed this with our OB/midwife", sub: "Provider is aware of preferences" },
    ]
  },
  {
    id: "dadRole",
    topic: "Dad's Role",
    question: "How do you see your role during active labor?",
    context: "You can be as hands-on or as steady-and-calm as she needs. Talk about what feels right.",
    type: "multi",
    options: [
      { label: "Physical support (massage, counter-pressure)", sub: "Active, hands-on help" },
      { label: "Verbal coaching and encouragement", sub: "Her anchor through contractions" },
      { label: "Advocate with medical staff", sub: "Speak up, ask questions for her" },
      { label: "Manage visitors and phone updates", sub: "Keep the outside world handled" },
      { label: "Stay calm and follow her lead", sub: "Don't add stress, just be present" },
      { label: "Handle logistics (parking, bags, food)", sub: "Keep the practical side running" },
    ]
  },
  {
    id: "postpartum",
    topic: "Postpartum",

function StatusBar() {
  const [time, setTime] = useState('');
  useEffect(() => {
    const update = () => {
      const now = new Date();
      const h = now.getHours(), m = now.getMinutes();
      setTime(`${h === 0 ? 12 : h > 12 ? h - 12 : h}:${m.toString().padStart(2,'0')}`);

    update();
    const t = setInterval(update, 10000);
    return () => clearInterval(t);
  }, []);
  return (
    <div className="status-bar">

function ProgressRing({ pct, color, size = 36 }) {
  const r = 13, cx = 18, cy = 18;
  const circ = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} viewBox="0 0 36 36">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="3" opacity="0.2" />
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="3"
        strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)}
        strokeLinecap="round" style={{transform:'rotate(-90deg)',transformOrigin:'50% 50%',transition:'stroke-dashoffset 0.5s ease'}} />
    </svg>
  );
}

// ─── BIRTH PLAN INTERVIEW ────────────────────────────────────────────────────
function BirthPlanInterview({ answers, onAnswer, onBack, onFinish }) {
  const startIdx = Math.max(0, BIRTH_PLAN_QUESTIONS.findIndex(q => !answers[q.id]));
  const [idx, setIdx] = useState(startIdx === -1 ? 0 : startIdx);
  const [animating, setAnimating] = useState(false);
  const q = BIRTH_PLAN_QUESTIONS[idx];
  const current = answers[q.id] || [];
  const pct = (idx + (current.length > 0 ? 1 : 0)) / BIRTH_PLAN_QUESTIONS.length;

  const toggle = (opt) => {
    if (q.type === 'single') {
      onAnswer(q.id, [opt]);
    } else {
      const exists = current.includes(opt);
      onAnswer(q.id, exists ? current.filter(x => x !== opt) : [...current, opt]);
    }
  };

  const next = () => {
    if (idx < BIRTH_PLAN_QUESTIONS.length - 1) {
      setIdx(idx + 1);
    } else {
      onFinish();
    }
  };

  const canNext = current.length > 0;
  const isLast = idx === BIRTH_PLAN_QUESTIONS.length - 1;

  return (
    <div className="screen">
      <div className="interview-header">
        <button className="back-btn" onClick={onBack}>
          <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
            <path d="M7 1L1 7L7 13" stroke="#1c2b1e" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
        <div className="interview-header-info">
          <div className="interview-header-title">Birth Plan</div>
          <div className="interview-progress-bar">
            <div className="interview-progress-fill" style={{width:`${pct*100}%`}} />
          </div>
        </div>
        <div style={{fontSize:12,color:'var(--soft)',fontWeight:500}}>{idx+1}/{BIRTH_PLAN_QUESTIONS.length}</div>
      </div>

      <div className="question-area">
        <div className="question-card" key={q.id}>
          <div className="question-topic-tag">{q.topic}</div>
          <div className="question-text">{q.question}</div>
          <div className="question-context">{q.context}</div>
        </div>

        {q.type === 'multi' && <div className="multi-hint">Select all that apply</div>}

        <div className="options-list" style={{marginTop: q.type === 'multi' ? 8 : 12}}>
          {q.options.map((opt, i) => {
            const sel = current.includes(opt.label);
            return (
              <button key={i} className={`option-btn ${sel ? 'selected' : ""}`} onClick={() => toggle(opt.label)}>
                <div className="option-check">
                  {sel && <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                    <path d="M1 4L3.5 6.5L9 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>}
                </div>
                <div>
                  <div className="option-label">{opt.label}</div>
                  {opt.sub && <div className="option-sub">{opt.sub}</div>}
                </div>
              </button>
            );
          })}
        </div>
      </div>

      <div className="nav-row">
        <button className="nav-btn-skip" onClick={next}>Skip</button>
        <button className={`nav-btn-next ${isLast ? 'finish' : ""}`} onClick={next} disabled={!canNext}>
          {isLast ? 'See Summary →' : "Next →"}
        </button>
      </div>
    </div>
  );
}

                    <div key={item.id} className={`bag-summary-item ${checked[item.id] ? 'packed' : ""}`}
                      onClick={() => onToggle(item.id)} style={{cursor:'pointer'}}>
                      <div className={`dot ${checked[item.id] ? 'packed' : "unpacked"}`} />
                      <span>{item.name}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{height:8}} />
      </div>
      <div className="action-btns">
        <button className="action-btn action-btn-secondary" onClick={onBack}>Edit</button>
        <button className="action-btn action-btn-primary" style={{background:'var(--terra)'}} onClick={onHome}>Done ✓</button>
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState(() => localStorage.getItem('tgp_screen') || 'home');
  const [birthAnswers, setBirthAnswers] = useState(() => {
    try { return JSON.parse(localStorage.getItem('tgp_birth') || '{}'); } catch { return {}; }
  });
  const [bagChecked, setBagChecked] = useState(() => {
    try { return JSON.parse(localStorage.getItem('tgp_bag') || '{}'); } catch { return {}; }
  });

  useEffect(() => { localStorage.setItem('tgp_screen', screen); }, [screen]);
  useEffect(() => { localStorage.setItem('tgp_birth', JSON.stringify(birthAnswers)); }, [birthAnswers]);
  useEffect(() => { localStorage.setItem('tgp_bag', JSON.stringify(bagChecked)); }, [bagChecked]);

  const handleBirthAnswer = (id, val) => setBirthAnswers(p => ({...p, [id]: val}));
  const handleBagToggle = (id) => setBagChecked(p => ({...p, [id]: !p[id]}));

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:'oklch(97% 0.012 75)'}}>
      <StatusBar />
      <div className="screen-area">
        {screen === 'home' && (
          <HomeScreen
            birthAnswers={birthAnswers}
            bagChecked={bagChecked}
            onStart={(type) => setScreen(type === 'birth' ? 'birth' : "bag")}
          />
        )}
        {screen === 'birth' && (
          <BirthPlanInterview
            answers={birthAnswers}
            onAnswer={handleBirthAnswer}
            onBack={() => setScreen('home')}
            onFinish={() => setScreen('birth-summary')}
          />
        )}
        {screen === 'birth-summary' && (
          <BirthPlanSummary
            answers={birthAnswers}
            onBack={() => setScreen('birth')}
            onHome={() => setScreen('home')}
          />
        )}
        {screen === 'bag' && (
          <BagInterview
            checked={bagChecked}
            onToggle={handleBagToggle}
            onBack={() => setScreen('home')}
            onFinish={() => setScreen('bag-summary')}
          />
        )}
        {screen === 'bag-summary' && (
          <BagSummary
            checked={bagChecked}
            onToggle={handleBagToggle}
            onBack={() => setScreen('bag')}
            onHome={() => setScreen('home')}
          />
        )}
      </div>
      <div className="home-indicator"><div className="home-bar" /></div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
