<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Game Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: "Inter", sans-serif;
    }

    .phone-shell {
      width: 393px;
      height: 852px;
      background: oklch(97% 0.012 75);
      border-radius: 54px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 0 10px #2a2a2a, 0 0 0 12px #444, 0 40px 80px rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
    }

    .status-bar {
      height: 54px;
      padding: 16px 28px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    .status-time {
      font-size: 15px;
      font-weight: 600;
      color: #1c2b1e;
    }

    .status-icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
    }

    .screen-area {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .home-indicator {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .home-bar {
      width: 130px;
      height: 5px;
      background: rgba(28, 43, 30, 0.25);
      border-radius: 3px;
    }

    :root {
      --cream: oklch(97% 0.012 75);
      --sage: oklch(52% 0.09 155);
      --sage-bg: oklch(94% 0.04 155);
      --terra: oklch(58% 0.11 50);
      --terra-bg: oklch(93% 0.04 50);
      --amber: oklch(68% 0.14 75);
      --amber-bg: oklch(95% 0.06 75);
      --navy: #1c2b1e;
      --mid: #4a5c4d;
      --soft: #8a9e8d;
      --line: oklch(93% 0.015 75);
    }

    @keyframes cardIn {
      from {
        transform: translateX(48px) scale(0.97);
        opacity: 0;
      }

      to {
        transform: translateX(0) scale(1);
        opacity: 1;
      }
    }

    @keyframes fadeUp {
      from {
        transform: translateY(12px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes slideDown {
      from {
        max-height: 0;
        opacity: 0;
      }

      to {
        max-height: 200px;
        opacity: 1;
      }
    }

    .screen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .scroll::-webkit-scrollbar {
      display: none;
    }

    /* ── HOME ── */
    .home-hero {
      padding: 24px 24px 18px;
      background: linear-gradient(155deg, oklch(94% 0.05 155) 0%, var(--cream) 65%);
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.09em;
      color: var(--sage);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .hero-title {
      font-family: "Lora", serif;
      font-size: 27px;
      font-weight: 600;
      color: var(--navy);
      line-height: 1.25;
      margin-bottom: 6px;
    }

    .hero-sub {
      font-size: 13px;
      color: var(--mid);
      line-height: 1.5;
    }

    .prow {
      display: flex;
      gap: 10px;
      padding: 12px 20px;
    }

    .ppill {
      flex: 1;
      background: white;
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: 0 1px 8px rgba(28, 43, 30, 0.08);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pring {
      position: relative;
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .pring svg {
      transform: rotate(-90deg);
    }

    .pring-lbl {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: var(--navy);
    }

    .pinfo-name {
      font-size: 10px;
      font-weight: 500;
      color: var(--soft);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .pinfo-val {
      font-size: 13px;
      font-weight: 600;
      color: var(--navy);
      margin-top: 1px;
    }

    .sec-lbl {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--soft);
      padding: 0 20px;
      margin-bottom: 10px;
    }

    .cards {
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .hcard {
      background: white;
      border-radius: 22px;
      padding: 20px 20px 18px;
      box-shadow: 0 2px 16px rgba(28, 43, 30, 0.08);
      cursor: pointer;
      transition: transform 0.15s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .hcard:active {
      transform: scale(0.98);
    }

    .hcard-accent {
      position: absolute;
      top: 0;
      right: 0;
      width: 80px;
      height: 80px;
      border-radius: 0 22px 0 80px;
      opacity: 0.1;
    }

    .hcard-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 12px;
    }

    .hcard-pre {
      font-size: 10px;
      font-weight: 600;
      color: var(--soft);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 2px;
    }

    .hcard-title {
      font-family: "Lora", serif;
      font-size: 19px;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 2px;
    }

    .hcard-sub {
      font-size: 11px;
      color: var(--soft);
      font-style: italic;
      margin-bottom: 10px;
    }

    .hcard-desc {
      font-size: 12px;
      color: var(--mid);
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .hcard-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hcard-meta {
      font-size: 11px;
      color: var(--soft);
    }

    .hcard-cta {
      font-size: 13px;
      font-weight: 600;
      color: var(--sage);
    }

    /* ── INTERVIEW HEADER ── */
    .ihead {
      padding: 13px 18px 11px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(28, 43, 30, 0.07);
      background: var(--cream);
      flex-shrink: 0;
    }

    .back-btn {
      width: 34px;
      height: 34px;
      border-radius: 11px;
      background: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 6px rgba(28, 43, 30, 0.1);
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .ihead-info {
      flex: 1;
    }

    .ihead-title {
      font-family: "Lora", serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--navy);
    }

    .prog-bar {
      height: 3px;
      background: oklch(88% 0.05 155);
      border-radius: 2px;
      margin-top: 5px;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      background: var(--sage);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .ihead-ct {
      font-size: 11px;
      color: var(--soft);
      font-weight: 600;
      flex-shrink: 0;
    }

    /* ── BIRTH PLAN QUESTIONS ── */
    .qarea {
      flex: 1;
      padding: 14px 16px 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .qcard {
      background: white;
      border-radius: 22px;
      padding: 18px 18px 16px;
      box-shadow: 0 4px 20px rgba(28, 43, 30, 0.09);
      margin-bottom: 10px;
      animation: cardIn 0.3s ease forwards;
      flex-shrink: 0;
      position: relative;
    }

    .qtag {
      display: inline-flex;
      background: var(--sage-bg);
      color: var(--sage);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 7px;
      padding: 3px 9px;
      margin-bottom: 9px;
    }

    .qtext {
      font-family: "Lora", serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--navy);
      line-height: 1.35;
      margin-bottom: 5px;
    }

    .qctx {
      font-size: 12px;
      color: var(--mid);
      line-height: 1.55;
    }

    .flag-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 30px;
      height: 30px;
      border-radius: 10px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .flag-btn.on {
      background: var(--amber-bg);
    }

    .opts {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-bottom: 4px;
    }

    .opts::-webkit-scrollbar {
      display: none;
    }

    .opt {
      background: white;
      border: 2px solid oklch(91% 0.02 75);
      border-radius: 14px;
      padding: 11px 14px;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.12s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .opt:active {
      transform: scale(0.98);
    }

    .opt.sel {
      border-color: var(--sage);
      background: var(--sage-bg);
    }

    /* Radio = round, Checkbox = square */
    .ocheck {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid oklch(80% 0.04 75);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
    }

    .ocheck-sq {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      border: 2px solid oklch(80% 0.04 75);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
    }

    .opt.sel .ocheck {
      background: var(--sage);
      border-color: var(--sage);
    }

    .opt.sel .ocheck-sq {
      background: var(--sage);
      border-color: var(--sage);
    }

    .type-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: 6px;
    }

    .olbl {
      font-size: 13px;
      font-weight: 500;
      color: var(--navy);
      line-height: 1.3;
      flex: 1;
    }

    .osub {
      font-size: 11px;
      color: var(--soft);
      margin-top: 1px;
    }


    /* Branch sub-question */
    .branch-card {
      background: oklch(96% 0.03 155);
      border-radius: 16px;
      padding: 14px 14px 10px;
      border-left: 3px solid var(--sage);
      margin-bottom: 8px;
      flex-shrink: 0;
      animation: fadeUp 0.25s ease forwards;
    }

    .branch-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--sage);
      margin-bottom: 6px;
    }

    .branch-q {
      font-family: "Lora", serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--navy);
      line-height: 1.35;
      margin-bottom: 4px;
    }

    .branch-ctx {
      font-size: 11px;
      color: var(--mid);
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .branch-opt {
      background: white;
      border: 2px solid oklch(88% 0.03 155);
      border-radius: 12px;
      padding: 10px 13px;
      text-align: left;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 9px;
      transition: all 0.12s;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 6px;
      width: 100%;
    }

    .branch-opt.sel {
      border-color: var(--sage);
      background: white;
    }

    .branch-ocheck {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 2px solid oklch(80% 0.04 75);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
    }

    .branch-opt.sel .branch-ocheck {
      background: var(--sage);
      border-color: var(--sage);
    }

    .custom-row {
      border: 2px dashed oklch(85% 0.03 75);
      border-radius: 14px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .custom-trigger {
      width: 100%;
      padding: 11px 14px;
      background: transparent;
      border: none;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .custom-expand {
      padding: 4px 12px 12px;
      animation: fadeUp 0.2s ease;
    }

    .custom-inp {
      width: 100%;
      border: 2px solid var(--line);
      border-radius: 10px;
      padding: 9px 12px;
      font-family: "Inter", sans-serif;
      font-size: 13px;
      color: var(--navy);
      background: white;
      outline: none;
      transition: border-color 0.15s;
    }

    .custom-inp:focus {
      border-color: var(--sage);
    }

    .custom-save {
      margin-top: 7px;
      width: 100%;
      height: 34px;
      border: none;
      background: var(--sage);
      border-radius: 9px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .flag-strip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      border-radius: 12px;
      margin-top: 4px;
      cursor: pointer;
      border: 2px solid oklch(91% 0.02 75);
      background: white;
      transition: all 0.12s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .flag-strip.on {
      border-color: var(--amber);
      background: var(--amber-bg);
    }

    .flag-lbl {
      font-size: 12px;
      font-weight: 500;
      color: var(--mid);
    }

    .flag-strip.on .flag-lbl {
      color: oklch(48% 0.12 75);
    }

    .mhint {
      font-size: 10px;
      color: var(--soft);
      text-align: center;
      margin-bottom: 5px;
      font-style: italic;
    }

    .nav-row {
      padding: 10px 16px 8px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .nav-skip {
      flex: 0 0 auto;
      padding: 0 18px;
      height: 50px;
      border: none;
      background: oklch(93% 0.018 75);
      border-radius: 15px;
      font-size: 13px;
      font-weight: 500;
      color: var(--mid);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-next {
      flex: 1;
      height: 50px;
      border: none;
      background: var(--sage);
      border-radius: 15px;
      font-size: 14px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }

    .nav-next:disabled {
      opacity: 0.35;
    }

    .nav-next.terra {
      background: var(--terra);
    }

    /* ── BAG INTERVIEW ── */
    .bag-icard {
      background: white;
      border-radius: 22px;
      padding: 18px 18px 14px;
      box-shadow: 0 4px 20px rgba(28, 43, 30, 0.09);
      margin: 14px 16px 10px;
      animation: cardIn 0.3s ease forwards;
      flex-shrink: 0;
    }

    .bag-cat-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .bag-cat-icon {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .bag-cat-name {
      font-family: "Lora", serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--navy);
    }

    .bag-cat-sub {
      font-size: 11px;
      color: var(--soft);
      margin-top: 1px;
    }

    .bag-hint {
      font-size: 11px;
      color: var(--mid);
      background: oklch(95% 0.03 155);
      border-radius: 8px;
      padding: 7px 11px;
      margin-bottom: 10px;
      line-height: 1.45;
    }

    /* Bag item selection rows */
    .bag-sel-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .bag-sel-item:last-of-type {
      border-bottom: none;
    }

    .bag-iname {
      font-size: 13px;
      font-weight: 500;
      color: var(--navy);
    }

    .bag-iname.off {
      color: var(--soft);
    }

    .bag-inote {
      font-size: 11px;
      color: var(--soft);
      margin-top: 1px;
    }

    .bag-stage-badge {
      margin-left: auto;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .badge-prep {
      background: oklch(93% 0.03 220);
      color: oklch(45% 0.08 220);
    }

    .badge-labor {
      background: var(--sage-bg);
      color: var(--sage);
    }

    .badge-post {
      background: var(--terra-bg);
      color: var(--terra);
    }

    /* Pill chip toggle */
    .bag-chip {
      border: none;
      border-radius: 20px;
      padding: 5px 11px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .bag-chip.in {
      background: var(--terra-bg);
      color: var(--terra);
    }

    .bag-chip.out {
      background: oklch(93% 0.02 75);
      color: var(--soft);
    }

    /* Custom item add form */
    .bag-add-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 2px dashed oklch(85% 0.03 75);
      background: transparent;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s;
    }

    .bag-add-btn:hover {
      border-color: var(--terra);
    }

    .bag-add-lbl {
      font-size: 13px;
      font-weight: 500;
      color: var(--soft);
    }

    .bag-add-form {
      background: oklch(96% 0.02 75);
      border-radius: 14px;
      padding: 12px 14px;
      margin-top: 8px;
      animation: fadeUp 0.2s ease;
    }

    .bag-add-field {
      width: 100%;
      border: 2px solid var(--line);
      border-radius: 10px;
      padding: 9px 12px;
      font-family: "Inter", sans-serif;
      font-size: 13px;
      color: var(--navy);
      background: white;
      outline: none;
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }

    .bag-add-field:focus {
      border-color: var(--terra);
    }

    .stage-pills {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .stage-pill {
      flex: 1;
      padding: 6px 0;
      border: none;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;

    const STAGE_LABELS = { prep: "Before You Leave", labor: "During Labor", post: "Recovery" };
    const BADGE_CLASS = { prep: "badge-prep", labor: "badge-labor", post: "badge-post" };

    // Bag starts empty — parents intentionally add what they want
    function buildInitialIncluded() {
      const map = {};
      BAG_CATS.forEach(cat => cat.items.forEach(item => { map[item.id] = false; }));
      return map;
    }

    // ─── SMALL COMPONENTS ────────────────────────────────────────────────────────
    function StatusBar() {
      const [time, setTime] = useState("");
      useEffect(() => {
        const tick = () => {
          const now = new Date(), h = now.getHours(), m = now.getMinutes();
          setTime(`${h === 0 ? 12 : h > 12 ? h - 12 : h}:${m.toString().padStart(2, "0")}`);
        };
        tick(); const t = setInterval(tick, 10000); return () => clearInterval(t);
      }, []);
      return (
        <div className="status-bar">
          <span className="status-time">{time}</span>
          <div className="dynamic-island" />
          <div className="status-icons">
            <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="3" width="3" height="9" rx="1" fill="#1c2b1e" /><rect x="4.5" y="2" width="3" height="10" rx="1" fill="#1c2b1e" /><rect x="9" y="0" width="3" height="12" rx="1" fill="#1c2b1e" /><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#1c2b1e" opacity="0.3" /></svg>
            <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1c2b1e" strokeOpacity="0.35" /><rect x="2" y="2" width="16" height="8" rx="2" fill="#1c2b1e" /><path d="M23 4v4a2 2 0 000-4z" fill="#1c2b1e" fillOpacity="0.4" /></svg>
          </div>
        </div>
      );
    }

    function PRing({ pct, color }) {
      const r = 13, c = 18, circ = 2 * Math.PI * r;
      return (
        <svg width="36" height="36" viewBox="0 0 36 36">
          <circle cx={c} cy={c} r={r} fill="none" stroke={color} strokeWidth="3" opacity="0.18" />
          <circle cx={c} cy={c} r={r} fill="none" stroke={color} strokeWidth="3"
            strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)} strokeLinecap="round"
            style={{ transform: "rotate(-90deg)", transformOrigin: "50% 50%", transition: "stroke-dashoffset 0.5s ease" }} />
        </svg>
      );
    }

    const Chk = ({ color = "white" }) => (
      <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
        <path d="M1 4L3.5 6.5L9 1" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      </svg>
    );

    const BkIcon = ({ on }) => (
      <svg width="13" height="16" viewBox="0 0 13 16" fill="none">
        <path d="M1 1h11v14l-5.5-3.5L1 15V1z" fill={on ? "var(--amber)" : "none"} stroke={on ? "var(--amber)" : "oklch(75% 0.04 75)"} strokeWidth="1.8" strokeLinejoin="round" />
      </svg>
    );

    const BackArrow = () => (
      <svg width="8" height="13" viewBox="0 0 8 13" fill="none">
        <path d="M7 1L1 6.5L7 12" stroke="#1c2b1e" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      </svg>
    );

    function getAns(answers, id) { return answers[id] || { selected: [], custom: "", flagged: false }; }

    // ─── HOME ────────────────────────────────────────────────────────────────────
    function Home({ bAnswers, bagIncluded, bagCustom, bagPacked, bagInterviewDone, onStart }) {
      const allBagItems = [
        ...BAG_CATS.flatMap(c => c.items.filter(i => bagIncluded[i.id] !== false)),
        ...Object.values(bagCustom).flat()
      ];
      const bagTotal = allBagItems.length;
      const bagDone = allBagItems.filter(i => bagPacked[i.id]).length;
      const birthDone = BPQ.filter(q => { const a = getAns(bAnswers, q.id); return a.selected.length > 0 || a.custom; }).length;
      const birthFlagged = BPQ.filter(q => getAns(bAnswers, q.id).flagged).length;
      return (
        <div className="screen">
          <div className="scroll">
            <div className="home-hero">
              <div className="eyebrow">Welcome, Dad</div>
              <div className="hero-title">The Game Plan</div>
              <div className="hero-sub">Two guided conversations to prepare together before labor begins.</div>
            </div>
            <div className="prow">
              <div className="ppill">
                <div className="pring"><PRing pct={birthDone / BPQ.length} color="var(--sage)" /><div className="pring-lbl">{birthDone === BPQ.length ? <span style={{ display: "flex", transform: "rotate(90deg)" }}><Chk color="var(--sage)" /></span> : `${Math.round(birthDone / BPQ.length * 100)}%`}</div></div>
                <div><div className="pinfo-name">Birth Plan</div><div className="pinfo-val">{birthDone}/{BPQ.length} topics</div></div>
              </div>
              <div className="ppill">
                <div className="pring"><PRing pct={bagTotal ? bagDone / bagTotal : 0} color="var(--terra)" /><div className="pring-lbl">{bagTotal && bagDone === bagTotal ? <span style={{ display: "flex", transform: "rotate(90deg)" }}><Chk color="var(--terra)" /></span> : `${bagTotal ? Math.round(bagDone / bagTotal * 100) : 0}%`}</div></div>
                <div><div className="pinfo-name">Labor Bag</div><div className="pinfo-val">{bagDone}/{bagTotal} packed</div></div>
              </div>
            </div>
            <div style={{ height: 4 }} />
            {/* ── The Game Plan section — appears above interviews once complete ── */}
            {(birthDone === BPQ.length || bagInterviewDone) && (
              <>
                <div className="sec-lbl">The Game Plan</div>
                <div className="cards" style={{ marginBottom: 32 }}>
                  {birthDone === BPQ.length && (
                    <div className="hcard" onClick={() => onStart("birth-summary")} style={{ borderLeft: "3px solid var(--sage)", borderRadius: "0 22px 22px 0" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ width: 32, height: 32, borderRadius: 10, background: "var(--sage-bg)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, flexShrink: 0 }}>🏥</div>
                        <div>
                          <div className="hcard-pre">Birth Plan</div>
                          <div style={{ fontFamily: "Lora, serif", fontSize: 15, fontWeight: 600, color: "var(--navy)" }}>View our plan →</div>
                        </div>
                        <div style={{ marginLeft: "auto", width: 28, height: 28, borderRadius: "50%", background: "var(--sage)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                          <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>
                        </div>
                      </div>
                    </div>
                  )}
                  {bagInterviewDone && (
                    <div className="hcard" onClick={() => onStart("bag-summary")} style={{ borderLeft: "3px solid var(--terra)", borderRadius: "0 22px 22px 0" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                        <div style={{ width: 32, height: 32, borderRadius: 10, background: "var(--terra-bg)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, flexShrink: 0 }}>🎒</div>
                        <div>
                          <div className="hcard-pre">Labor Bag</div>
                          <div style={{ fontFamily: "Lora, serif", fontSize: 15, fontWeight: 600, color: "var(--navy)" }}>View our bag list →</div>
                        </div>
                        <div style={{ marginLeft: "auto", width: 28, height: 28, borderRadius: "50%", background: "var(--terra)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                          <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              </>
            )}
            <div className="sec-lbl">Your Interviews</div>
            <div className="cards">
              <div className="hcard" onClick={() => onStart("birth")} style={{ borderTop: birthDone === BPQ.length ? "3px solid var(--sage)" : undefined }}>
                <div className="hcard-accent" style={{ background: "var(--sage)" }} />
                <div className="hcard-icon" style={{ background: "var(--sage-bg)" }}>🏥</div>
                <div className="hcard-pre">What's our plan?</div>
                <div className="hcard-title">Birth Plan Interview</div>
                <div className="hcard-sub">Let's build our Birth Plan</div>
                <div className="hcard-desc">Pain management, interventions, who's in the room, cord cutting, skin-to-skin and more — answered together.</div>
                <div className="hcard-foot">
                  <div className="hcard-meta">{BPQ.length} topics{birthFlagged > 0 ? ` · ${birthFlagged} flagged` : ""}</div>
                  <div className="hcard-cta">{birthDone === BPQ.length ? "Done ✓" : birthDone > 0 ? "Continue →" : "Start →"}</div>
                </div>
              </div>
              <div className="hcard" onClick={() => onStart("bag")} style={{ borderTop: bagDone > 0 && bagDone === bagTotal ? "3px solid var(--terra)" : undefined }}>
                <div className="hcard-accent" style={{ background: "var(--terra)" }} />
                <div className="hcard-icon" style={{ background: "var(--terra-bg)" }}>🎒</div>
                <div className="hcard-pre">What to bring?</div>
                <div className="hcard-title">Labor Bag Interview</div>
                <div className="hcard-sub">Checklist items for our Labor Bag</div>
                <div className="hcard-desc">Review suggested items, remove what you don't need, add your own — then pack category by category.</div>
                <div className="hcard-foot">
                  <div className="hcard-meta">{bagTotal} items selected · 6 categories</div>
                  <div className="hcard-cta" style={{ color: "var(--terra)" }}>{bagDone === bagTotal && bagTotal > 0 ? "Done ✓" : bagDone > 0 ? "Continue →" : "Start →"}</div>
                </div>
              </div>
            </div>

            <div className="sec-lbl">A Reminder</div>
            <div style={{ padding: "0 20px 28px" }}>
              <div style={{ background: "white", borderRadius: 18, padding: "14px 16px", boxShadow: "0 2px 10px rgba(28,43,30,0.07)" }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "var(--sage)", marginBottom: 4, letterSpacing: "0.07em" }}>PRO TIP</div>
                <div style={{ fontSize: 12, color: "var(--navy)", lineHeight: 1.6 }}>Do the Birth Plan interview when you are both relaxed. Set aside 20 quiet minutes — not in the car on the way to a checkup.</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── OPTION BUTTON ───────────────────────────────────────────────────────────
    function OptBtn({ label, sub, selected, onToggle, inputType }) {
      const isSquare = inputType === "multi";
      return (
        <button className={`opt ${selected ? "sel" : ""}`} onClick={() => onToggle(label)}>
          <div className={isSquare ? "ocheck-sq" : "ocheck"}>{selected && <Chk />}</div>
          <div><div className="olbl">{label}</div>{sub && <div className="osub">{sub}</div>}</div>
        </button>
      );
    }

    // ─── BRANCH SUB-QUESTION ─────────────────────────────────────────────────────
    function BranchCard({ branch, branchAns, onBranchAnswer }) {
      const toggle = (label) => {
        const sel = branchAns.selected || [];
        const next = branch.type === "single"
          ? (sel.includes(label) ? [] : [label])
          : sel.includes(label) ? sel.filter(x => x !== label) : [...sel, label];
        onBranchAnswer({ ...branchAns, selected: next });
      };
      const isRound = branch.type === "single";
      return (
        <div className="branch-card">
          <div className="branch-tag">↳ Follow-up</div>
          <div className="branch-q">{branch.question}</div>
          <div className="branch-ctx">{branch.context}</div>
          {branch.type === "multi" && <div style={{ fontSize: 10, color: "var(--soft)", fontStyle: "italic", marginBottom: 8 }}>Select all that apply</div>}
          {branch.options.map((opt, i) => {
            const sel = (branchAns.selected || []).includes(opt.label);
            return (
              <button key={i} className={`branch-opt ${sel ? "sel" : ""}`} onClick={() => toggle(opt.label)}>
                <div className="branch-ocheck" style={{ borderRadius: isRound ? "50%" : "5px" }}>{sel && <Chk size={8} />}</div>
                <div><div className="olbl" style={{ fontSize: 12 }}>{opt.label}</div>{opt.sub && <div className="osub">{opt.sub}</div>}</div>
              </button>
            );
          })}
        </div>
      );
    }

    // ─── BIRTH INTERVIEW ─────────────────────────────────────────────────────────
    function BirthInterview({ answers, onAnswer, onBack, onFinish, editQuestionId, onEditDone }) {
      const editMode = !!editQuestionId;
      const editIdx = editQuestionId ? BPQ.findIndex(q => q.id === editQuestionId) : -1;
      const first = editMode ? editIdx : BPQ.findIndex(q => { const a = getAns(answers, q.id); return a.selected.length === 0 && !a.custom; });
      const [idx, setIdx] = useState(first >= 0 ? first : 0);
      const [showCustom, setShowCustom] = useState(false);
      const [draft, setDraft] = useState("");

      // Reset to editIdx if editQuestionId changes
      useEffect(() => { if (editMode && editIdx >= 0) setIdx(editIdx); }, [editQuestionId]);
      useEffect(() => { setShowCustom(false); setDraft(getAns(answers, BPQ[idx].id).custom || ""); }, [idx]);

      const q = BPQ[idx];
      const ans = getAns(answers, q.id);
      const branchId = q.branch ? q.branch.id : null;
      const branchAns = branchId ? getAns(answers, branchId) : null;
      const branchTriggered = q.branch && ans.selected.length > 0 && q.branch.triggerWhen(ans.selected);

      const isFreeform = q.type === "freeform";
      const hasAnswer = ans.selected.length > 0 || !!ans.custom;
      const isLast = idx === BPQ.length - 1;
      const pct = idx / BPQ.length;

      const toggle = (label) => {
        const sel = ans.selected;
        const newSel = q.type === "single"
          ? (sel.includes(label) ? [] : [label])
          : sel.includes(label) ? sel.filter(x => x !== label) : [...sel, label];
        onAnswer(q.id, { ...ans, selected: newSel });
        const opt = q.options?.find(o => o.label === label);
        if (q.type === "single" && opt?.noFollow && branchId) {
          onAnswer(branchId, { selected: [], custom: "", flagged: false });
        }
      };
      const toggleFlag = () => onAnswer(q.id, { ...ans, flagged: !ans.flagged });
      const saveCustom = () => { if (draft.trim()) { onAnswer(q.id, { ...ans, custom: draft.trim() }); setShowCustom(false); } };
      const goNext = () => {
        if (editMode) { onEditDone(); return; }
        if (!isLast) setIdx(idx + 1); else onFinish();
      };
      const goBack = () => {
        if (editMode) { onEditDone(); return; }
        if (idx > 0) setIdx(idx - 1); else onBack();
      };
      const typeLabel = q.type === "single" ? "Choose one" : q.type === "multi" ? "Choose all that apply" : null;

      return (
        <div className="screen">
          <div className="ihead">
            <button className="back-btn" onClick={goBack}><BackArrow /></button>
            <div className="ihead-info">
              <div className="ihead-title" style={{ fontSize: editMode ? 14 : 16 }}>{editMode ? q.topic : "Birth Plan"}</div>
              {!editMode && <div className="prog-bar"><div className="prog-fill" style={{ width: `${pct * 100}%` }} /></div>}
            </div>
            <div className="ihead-ct">{editMode ? "Editing" : `${idx + 1}/${BPQ.length}`}</div>
          </div>
          <div className="qarea">
            <div className="qcard" key={q.id}>
              <div className="qtag">{q.topic}</div>
              <div className="qtext">{q.question}</div>
              <div className="qctx">{q.context}</div>
              <button className={`flag-btn ${ans.flagged ? "on" : ""}`} onClick={toggleFlag}><BkIcon on={ans.flagged} /></button>
            </div>

            {isFreeform ? (
              /* ── Freeform as structured options ── */
              <div className="opts">
                <div className="type-label">Choose one</div>
                {/* Option 1: Nothing Else */}
                <button
                  className={`opt ${ans.selected.includes("Nothing else to add") ? "sel" : ""}`}
                  onClick={() => { onAnswer(q.id, { ...ans, selected: ["Nothing else to add"], custom: "" }); setShowCustom(false); setDraft(""); }}
                >
                  <div className="ocheck">{ans.selected.includes("Nothing else to add") && <Chk />}</div>
                  <div><div className="olbl">Nothing else to add</div><div className="osub">We are happy with what we have covered</div></div>
                </button>
                {/* Option 2: Add own notes */}
                <button
                  className={`opt ${ans.selected.includes("Add our own notes") ? "sel" : ""}`}
                  onClick={() => { onAnswer(q.id, { ...ans, selected: ["Add our own notes"] }); setShowCustom(true); }}
                >
                  <div className="ocheck">{ans.selected.includes("Add our own notes") && <Chk />}</div>
                  <div><div className="olbl">Add our own notes</div><div className="osub">Cultural needs, religious preferences, specific requests…</div></div>
                </button>
                {/* Expanded textarea when "Add notes" is selected */}
                {ans.selected.includes("Add our own notes") && (
                  <div className="custom-row" style={{ background: ans.custom ? "var(--sage-bg)" : "white", borderColor: ans.custom ? "var(--sage)" : undefined, animation: "fadeUp 0.2s ease" }}>
                    <div className="custom-expand">
                      <textarea
                        className="custom-inp"
                        rows={4}
                        placeholder={"e.g. We observe Shabbat and need a kosher meal option.\ne.g. We want our doula present for all consultations."}
                        value={ans.custom || ""}
                        onChange={e => onAnswer(q.id, { ...ans, selected: ["Add our own notes"], custom: e.target.value })}
                        style={{ resize: "none" }}
                        autoFocus
                      />
                      {ans.custom && <div style={{ fontSize: 11, color: "var(--sage)", marginTop: 4, fontWeight: 500 }}>✓ Saved</div>}
                    </div>
                  </div>
                )}
                <button className={`flag-strip ${ans.flagged ? "on" : ""}`} onClick={toggleFlag}>
                  <BkIcon on={ans.flagged} />
                  <span className="flag-lbl">{ans.flagged ? "Flagged — we will come back to this" : "Come back to this later"}</span>
                </button>
              </div>
            ) : (
              /* ── Structured options ── */
              <div className="opts">
                {typeLabel && <div className="type-label">{typeLabel}</div>}
                {q.options.map((opt, i) => (
                  <OptBtn key={i} label={opt.label} sub={opt.sub} selected={ans.selected.includes(opt.label)} onToggle={toggle} inputType={q.type} />
                ))}

                {branchTriggered && (
                  <BranchCard branch={q.branch} branchAns={branchAns || { selected: [], custom: "" }} onBranchAnswer={val => onAnswer(branchId, val)} />
                )}

                <div className="custom-row" style={{ background: ans.custom ? "var(--sage-bg)" : "white", borderColor: ans.custom ? "var(--sage)" : undefined }}>
                  {!showCustom
                    ? <button className="custom-trigger" onClick={() => { setShowCustom(true); setDraft(ans.custom || ""); }}>
                      <div className="ocheck-sq" style={{ border: "2px dashed oklch(75% 0.04 75)", background: ans.custom ? "var(--sage)" : "transparent" }}>{ans.custom && <Chk />}</div>
                      <div className="olbl" style={{ color: ans.custom ? "var(--navy)" : "var(--soft)", fontStyle: ans.custom ? "normal" : "italic" }}>{ans.custom || "Add our own preference..."}</div>
                    </button>
                    : <div className="custom-expand">
                      <textarea className="custom-inp" rows={2} placeholder="Describe your preference in your own words..." value={draft} onChange={e => setDraft(e.target.value)} autoFocus />
                      <button className="custom-save" onClick={saveCustom}>Save</button>
                    </div>
                  }
                </div>

                <button className={`flag-strip ${ans.flagged ? "on" : ""}`} onClick={toggleFlag}>
                  <BkIcon on={ans.flagged} />
                  <span className="flag-lbl">{ans.flagged ? "Flagged — we will come back to this" : "Come back to this later"}</span>
                </button>
              </div>
            )}
          </div>
          <div className="nav-row">
            <button className="nav-skip" onClick={goBack}>{editMode ? "Cancel" : "← Back"}</button>
            <button className={`nav-next ${isLast && !editMode ? "terra" : ""}`} onClick={goNext} disabled={!isFreeform && !hasAnswer && !ans.flagged}>{editMode ? "Save →" : isLast ? "See Summary →" : "Next →"}</button>
          </div>
        </div>
      );
    }

    // ─── BIRTH SUMMARY ───────────────────────────────────────────────────────────
    function BirthSummary({ answers, onBack, onHome, onEditQuestion }) {
      const decided = BPQ.filter(q => { const a = getAns(answers, q.id); return (a.selected.length > 0 || a.custom) && !a.flagged; });
      const flagged = BPQ.filter(q => getAns(answers, q.id).flagged);
      const skipped = BPQ.filter(q => { const a = getAns(answers, q.id); return a.selected.length === 0 && !a.custom && !a.flagged; });

      const TC = ({ q, variant }) => {
        const a = getAns(answers, q.id);
        const branchId = q.branch?.id;
        const bAns = branchId ? getAns(answers, branchId) : null;
        const isEmpty = a.selected.length === 0 && !a.custom && !a.flagged;
        return (
          <div className="sum-tc" style={{ borderLeft: isEmpty ? "3px solid oklch(88% 0.03 75)" : undefined }}>
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 5 }}>
              <div className="sum-tn">{q.topic}</div>
              <button onClick={() => onEditQuestion(q.id)} style={{ border: "none", background: "var(--sage-bg)", color: "var(--sage)", fontSize: 11, fontWeight: 600, borderRadius: 7, padding: "3px 9px", cursor: "pointer", flexShrink: 0, marginLeft: 8 }}>Edit</button>
            </div>
            {q.type === "freeform" ? (
              a.custom
                ? <div style={{ fontSize: 12, color: "var(--navy)", lineHeight: 1.55, fontStyle: "italic" }}>"{a.custom}"</div>
                : <span style={{ fontSize: 11, color: "var(--soft)", fontStyle: "italic" }}>Not answered</span>
            ) : (
              <>
                <div className="sum-pills">
                  {a.selected.map((s, i) => <span key={i} className={`spill ${variant === "flagged" ? "amb" : ""}`}>{s}</span>)}
                  {a.custom && <span className="spill cust">"{a.custom}"</span>}
                  {a.selected.length === 0 && !a.custom && <span style={{ fontSize: 11, color: "var(--soft)", fontStyle: "italic" }}>Not answered</span>}
                </div>
                {bAns && bAns.selected.length > 0 && (
                  <div style={{ marginTop: 6, paddingLeft: 8, borderLeft: "2px solid var(--sage-bg)" }}>
                    <div style={{ fontSize: 10, color: "var(--sage)", fontWeight: 700, marginBottom: 3 }}>↳ Also</div>
                    <div className="sum-pills">{bAns.selected.map((s, i) => <span key={i} className="spill" style={{ background: "oklch(92% 0.03 155)" }}>{s}</span>)}</div>
                  </div>
                )}
              </>
            )}
          </div>
        );
      };

      return (
        <div className="screen">
          <div className="scroll">
            <div className="sum-hero">
              <div className="sum-stats">
                <div className="sum-stat"><div className="sum-stat-n" style={{ color: "var(--sage)" }}>{decided.length}</div><div className="sum-stat-l">Decided</div></div>
                {flagged.length > 0 && <div className="sum-stat"><div className="sum-stat-n" style={{ color: "var(--amber)" }}>{flagged.length}</div><div className="sum-stat-l">To revisit</div></div>}
                {skipped.length > 0 && <div className="sum-stat"><div className="sum-stat-n" style={{ color: "var(--soft)" }}>{skipped.length}</div><div className="sum-stat-l">Skipped</div></div>}
              </div>
              <div className="sum-title">Your Birth Plan</div>
              <div className="sum-sub">{decided.length} of {BPQ.length} topics covered</div>
            </div>
            {decided.length > 0 && (
              <div className="sum-sec">
                <div className="sum-sec-lbl"><span style={{ color: "var(--sage)" }}>✓</span> Decided</div>
                {decided.map(q => <TC key={q.id} q={q} variant="decided" />)}
              </div>
            )}
            {flagged.length > 0 && (
              <div className="sum-sec">
                <div className="sum-sec-lbl"><BkIcon on /> Come Back to These</div>
                {flagged.map(q => <TC key={q.id} q={q} variant="flagged" />)}
              </div>
            )}
            {skipped.length > 0 && (
              <div className="sum-sec">
                <div className="sum-sec-lbl">Not Yet Discussed</div>
                {skipped.map(q => (
                  <div key={q.id} className="sum-tc" style={{ opacity: 0.55, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div className="sum-tn" style={{ marginBottom: 0 }}>{q.topic}</div>
                    <button onClick={() => onEditQuestion(q.id)} style={{ border: "none", background: "oklch(93% 0.018 75)", color: "var(--mid)", fontSize: 11, fontWeight: 600, borderRadius: 7, padding: "3px 9px", cursor: "pointer", flexShrink: 0 }}>Answer</button>
                  </div>
                ))}
              </div>
            )}
            <div className="sum-sec">
              <div className="sum-sec-lbl">At the Hospital</div>
              <div className="guide-card">
                {["Print 3 copies before you leave home.", "Hand one to your nurse when you arrive.", "Stay flexible — birth rarely follows a plan exactly.", "Your job: be her voice when she cannot speak for herself.", "Ask questions. Do not assume. Advocate kindly."].map((l, i) => (
                  <div key={i} className="guide-ln"><span style={{ color: "var(--sage)", fontWeight: 700 }}>→</span><span>{l}</span></div>
                ))}
              </div>
            </div>
            <div style={{ height: 10 }} />
          </div>
          <div className="act-row">
            <button className="act act-s" onClick={onBack}>Edit</button>
            <button className="act act-p" onClick={onHome}>Done ✓</button>
          </div>
        </div>
      );
    }

    // ─── BAG INTERVIEW ───────────────────────────────────────────────────────────
    function BagInterview({ included, onToggleIncluded, customItems, onAddCustom, onRemoveCustom, onBack, onFinish }) {
      const [catIdx, setCatIdx] = useState(0);
      const [showAddForm, setShowAddForm] = useState(false);
      const [newName, setNewName] = useState("");
      const [newNote, setNewNote] = useState("");
      const [newStage, setNewStage] = useState("prep");

      const cat = BAG_CATS[catIdx];
      const isLast = catIdx === BAG_CATS.length - 1;
      const customs = customItems[cat.id] || [];
      const allItems = [...cat.items, ...customs];
      const includedCount = allItems.filter(i => included[i.id] !== false).length;
      const pct = catIdx / BAG_CATS.length;

      const resetForm = () => { setShowAddForm(false); setNewName(""); setNewNote(""); setNewStage("prep"); };
      const addItem = () => {
        if (!newName.trim()) return;
        const newItem = { id: `custom-${cat.id}-${Date.now()}`, name: newName.trim(), note: newNote.trim(), stage: newStage, isCustom: true };
        onAddCustom(cat.id, newItem);
        resetForm();
      };
      const next = () => { resetForm(); if (!isLast) setCatIdx(catIdx + 1); else onFinish(); };
      const goBack = () => { resetForm(); if (catIdx === 0) onBack(); else setCatIdx(catIdx - 1); };

      const StagePill = ({ s, label }) => (
        <button className={`stage-pill ${newStage === s ? `active-${s}` : "inactive"}`} onClick={() => setNewStage(s)}>{label}</button>
      );

      return (
        <div className="screen">
          <div className="ihead">
            <button className="back-btn" onClick={goBack}><BackArrow /></button>
            <div className="ihead-info">
              <div className="ihead-title">Labor Bag</div>
              <div className="prog-bar" style={{ background: "oklch(90% 0.04 50)" }}>
                <div className="prog-fill" style={{ width: `${pct * 100}%`, background: "var(--terra)" }} />
              </div>
            </div>
            <div className="ihead-ct">{catIdx + 1}/{BAG_CATS.length}</div>
          </div>

          <div className="scroll">
            <div className="bag-icard" key={cat.id}>
              <div className="bag-cat-hdr">
                <div className="bag-cat-icon" style={{ background: cat.color }}>{cat.icon}</div>
                <div>
                  <div className="bag-cat-name">{cat.name}</div>
                  <div className="bag-cat-sub">{includedCount} of {allItems.length} items selected</div>
                </div>
              </div>
              <div className="bag-hint">Tap <strong>+ Add</strong> to include an item in your bag. Add your own below too.</div>

              {/* Preset items */}
              {cat.items.map(item => {
                const on = included[item.id] !== false;
                return (
                  <div key={item.id} className="bag-sel-item">
                    <div style={{ flex: 1 }}>
                      <div className={`bag-iname ${on ? "" : "off"}`}>{item.name}</div>
                      {item.note && <div className="bag-inote">{item.note}</div>}
                    </div>
                    <span className={`bag-stage-badge ${on ? BADGE_CLASS[item.stage] : ""}`} style={!on ? { background: "oklch(92% 0.01 75)", color: "var(--soft)" } : {}}>{STAGE_LABELS[item.stage]}</span>
                    <button className={`bag-chip ${on ? "in" : "out"}`} onClick={() => onToggleIncluded(item.id)}>
                      {on ? "✓ In" : "+ Add"}
                    </button>
                  </div>
                );
              })}

              {/* Custom items */}
              {customs.map(item => {
                const on = included[item.id] !== false;
                return (
                  <div key={item.id} className="bag-sel-item">
                    <div style={{ flex: 1 }}>
                      <div className={`bag-iname ${on ? "" : "off"}`}>{item.name}</div>
                      {item.note && <div className="bag-inote">{item.note}</div>}
                    </div>
                    <span className={`bag-stage-badge ${on ? BADGE_CLASS[item.stage] : ""}`} style={!on ? { background: "oklch(92% 0.01 75)", color: "var(--soft)" } : {}}>{STAGE_LABELS[item.stage]}</span>
                    <button className={`bag-chip ${on ? "in" : "out"}`} onClick={() => onToggleIncluded(item.id)}>
                      {on ? "✓ In" : "+ Add"}
                    </button>
                    <button className="bag-custom-del" onClick={e => { e.stopPropagation(); onRemoveCustom(cat.id, item.id); }}>
                      <svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 1l6 6M7 1L1 7" stroke="var(--soft)" strokeWidth="1.5" strokeLinecap="round" /></svg>
                    </button>
                  </div>
                );
              })}

              {/* Add item */}
              {!showAddForm
                ? <button className="bag-add-btn" onClick={() => setShowAddForm(true)}>
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="var(--soft)" strokeWidth="1.8" strokeLinecap="round" /></svg>
                  <span className="bag-add-lbl">Add our own item...</span>
                </button>
                : <div className="bag-add-form">
                  <input className="bag-add-field" placeholder="Item name (e.g. Favorite snack for her)" value={newName} onChange={e => setNewName(e.target.value)} autoFocus />
                  <input className="bag-add-field" placeholder="Note or reminder (optional)" value={newNote} onChange={e => setNewNote(e.target.value)} />
                  <div className="stage-pills">
                    <StagePill s="prep" label="Before" />
                    <StagePill s="labor" label="Labor" />
                    <StagePill s="post" label="Recovery" />
                  </div>
                  <div className="bag-add-row">
                    <button className="bag-add-cancel" onClick={resetForm}>Cancel</button>
                    <button className="bag-add-save" onClick={addItem} disabled={!newName.trim()}>Add Item</button>
                  </div>
                </div>
              }
            </div>
          </div>

          <div className="nav-row">
            <button className="nav-skip" onClick={next} style={{ background: "oklch(93% 0.018 75)" }}>Skip</button>
            <button className={`nav-next ${isLast ? "terra" : ""}`} style={!isLast ? { background: "var(--terra)" } : {}} onClick={next}>
              {isLast ? "See Checklist →" : "Next Category →"}
            </button>
          </div>
        </div>
      );
    }

    // ─── BAG SUMMARY ─────────────────────────────────────────────────────────────
    function BagSummary({ included, customItems, packed, onTogglePacked, onBack, onHome }) {
      const [activeTab, setActiveTab] = useState("all");
      const tabs = [{ id: "all", label: "All" }, { id: "prep", label: "Before" }, { id: "labor", label: "Labor" }, { id: "post", label: "Recovery" }];

      const allSelected = BAG_CATS.flatMap(c => [
        ...c.items.filter(i => included[i.id] !== false),
        ...(customItems[c.id] || []).filter(i => included[i.id] !== false)
      ]);
      const total = allSelected.length;
      const packedCt = allSelected.filter(i => packed[i.id]).length;
      const pct = total ? packedCt / total : 0;

      return (
        <div className="screen">
          <div className="scroll">
            <div style={{ background: "linear-gradient(170deg, oklch(92% 0.06 50), oklch(97% 0.012 75))", padding: "22px 20px 16px", textAlign: "center" }}>
              <div style={{ fontSize: 40, marginBottom: 8 }}>{pct === 1 ? "✅" : "🎒"}</div>
              <div className="sum-title">{pct === 1 ? "Bag is Ready!" : "Labor Bag Checklist"}</div>
              <div className="sum-sub" style={{ marginBottom: 14 }}>{packedCt} of {total} items packed</div>
              <div className="bsum-tabs">
                {tabs.map(t => <button key={t.id} className={`bsum-tab ${activeTab === t.id ? "on" : "off"}`} onClick={() => setActiveTab(t.id)}>{t.label}</button>)}
              </div>
            </div>
            <div style={{ padding: "12px 16px 0" }}>
              {BAG_CATS.map(cat => {
                const items = [
                  ...cat.items.filter(i => included[i.id] !== false),
                  ...(customItems[cat.id] || []).filter(i => included[i.id] !== false)
                ].filter(i => activeTab === "all" || i.stage === activeTab);
                if (!items.length) return null;
                const pkd = items.filter(i => packed[i.id]).length;
                return (
                  <div key={cat.id} className="bsum-cat">
                    <div className="bsum-cat-hdr">
                      <div className="bsum-cat-name"><span>{cat.icon}</span>{cat.name}</div>
                      <div className="bsum-cat-ct">{pkd}/{items.length}</div>
                    </div>
                    <div style={{ background: "white", borderRadius: 14, padding: "4px 10px", boxShadow: "0 2px 8px rgba(28,43,30,0.06)" }}>
                      {items.map(item => (
                        <div key={item.id} className={`bsum-item ${packed[item.id] ? "pk" : ""}`} onClick={() => onTogglePacked(item.id)}>
                          <div className={`bdot ${packed[item.id] ? "on" : "off"}`}>{packed[item.id] && <svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3 5.5L8 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" /></svg>}</div>
                          <span>{item.name}</span>
                          {item.isCustom && <span style={{ fontSize: 9, color: "var(--soft)", marginLeft: 4, fontStyle: "italic" }}>custom</span>}
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{ height: 8 }} />
          </div>
          <div className="act-row">
            <button className="act act-s" onClick={onBack}>Edit</button>
            <button className="act act-t" onClick={onHome}>Done ✓</button>
          </div>
        </div>
      );
    }

    // ─── ROOT APP ────────────────────────────────────────────────────────────────
    const APP_VERSION = "6";
    function clearIfStale() {
      if (localStorage.getItem("tgp_version") !== APP_VERSION) {
        ["tgp3_screen", "tgp3_birth", "tgp3_included", "tgp3_custom", "tgp3_packed", "tgp3_bag_done", "tgp_screen", "tgp_birth", "tgp_bag", "tgp2_screen", "tgp2_birth", "tgp2_bag"].forEach(k => localStorage.removeItem(k));
        localStorage.setItem("tgp_version", APP_VERSION);
      }
    }
    clearIfStale();
    function App() {
      const [screen, setScreen] = useState(() => localStorage.getItem("tgp3_screen") || "home");
      const [bAnswers, setBAnswers] = useState(() => { try { return JSON.parse(localStorage.getItem("tgp3_birth") || "{}"); } catch { return {}; } });
      const [bagIncluded, setBagIncluded] = useState(() => { try { return JSON.parse(localStorage.getItem("tgp3_included") || "null") || buildInitialIncluded(); } catch { return buildInitialIncluded(); } });
      const [bagCustom, setBagCustom] = useState(() => { try { return JSON.parse(localStorage.getItem("tgp3_custom") || "{}"); } catch { return {}; } });
      const [bagPacked, setBagPacked] = useState(() => { try { return JSON.parse(localStorage.getItem("tgp3_packed") || "{}"); } catch { return {}; } });
      const [bagInterviewDone, setBagInterviewDone] = useState(() => localStorage.getItem("tgp3_bag_done") === "1");
      const [editQuestionId, setEditQuestionId] = useState(null);

      useEffect(() => { localStorage.setItem("tgp3_screen", screen); }, [screen]);
      useEffect(() => { localStorage.setItem("tgp3_birth", JSON.stringify(bAnswers)); }, [bAnswers]);
      useEffect(() => { localStorage.setItem("tgp3_included", JSON.stringify(bagIncluded)); }, [bagIncluded]);
      useEffect(() => { localStorage.setItem("tgp3_custom", JSON.stringify(bagCustom)); }, [bagCustom]);
      useEffect(() => { localStorage.setItem("tgp3_packed", JSON.stringify(bagPacked)); }, [bagPacked]);
      useEffect(() => { localStorage.setItem("tgp3_bag_done", bagInterviewDone ? "1" : "0"); }, [bagInterviewDone]);

      const handleAnswer = (id, val) => setBAnswers(p => ({ ...p, [id]: val }));
      const toggleIncluded = (id) => setBagIncluded(p => ({ ...p, [id]: p[id] === false ? true : false }));
      const addCustom = (catId, item) => {
        setBagCustom(p => ({ ...p, [catId]: [...(p[catId] || []), item] }));
        setBagIncluded(p => ({ ...p, [item.id]: true }));
      };
      const removeCustom = (catId, itemId) => {
        setBagCustom(p => ({ ...p, [catId]: (p[catId] || []).filter(i => i.id !== itemId) }));
        setBagIncluded(p => { const n = { ...p }; delete n[itemId]; return n; });
      };
      const togglePacked = (id) => setBagPacked(p => ({ ...p, [id]: !p[id] }));

      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%", background: "var(--cream)" }}>
          <StatusBar />
          <div className="screen-area">
            {screen === "home" && <Home bAnswers={bAnswers} bagIncluded={bagIncluded} bagCustom={bagCustom} bagPacked={bagPacked} bagInterviewDone={bagInterviewDone} onStart={t => setScreen(t === "birth" ? "birth" : t === "birth-summary" ? "birth-summary" : t === "bag-summary" ? "bag-summary" : "bag")} />}
            {screen === "birth" && <BirthInterview answers={bAnswers} onAnswer={handleAnswer} onBack={() => setScreen("home")} onFinish={() => setScreen("birth-summary")} editQuestionId={editQuestionId} onEditDone={() => { setEditQuestionId(null); setScreen("birth-summary"); }} />}
            {screen === "birth-summary" && <BirthSummary answers={bAnswers} onBack={() => setScreen("birth")} onHome={() => setScreen("home")} onEditQuestion={(id) => { setEditQuestionId(id); setScreen("birth"); }} />}
            {screen === "bag" && <BagInterview included={bagIncluded} onToggleIncluded={toggleIncluded} customItems={bagCustom} onAddCustom={addCustom} onRemoveCustom={removeCustom} onBack={() => setScreen("home")} onFinish={() => { setBagInterviewDone(true); setScreen("bag-summary"); }} />}
            {screen === "bag-summary" && <BagSummary included={bagIncluded} customItems={bagCustom} packed={bagPacked} onTogglePacked={togglePacked} onBack={() => setScreen("bag")} onHome={() => setScreen("home")} />}
          </div>
          <div className="home-indicator"><div className="home-bar" /></div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
